name: Build & Deploy

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io/stornoro

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, frontend]
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # QEMU registers the linux/arm64 kernel handlers on the amd64 runner
      # so buildx can cross-build ARM images via emulation. Without this,
      # the build-push-action below errors out on the arm64 platform.
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          # Publish a manifest list with both linux/amd64 (regular x86_64
          # Linux servers) and linux/arm64 (Apple Silicon Macs running
          # Docker Desktop, Ampere/Graviton ARM Linux servers, RPi 4+
          # 64-bit). Anything else falls back to a clear "no manifest"
          # error from `docker pull` — which the installer detects and
          # reports cleanly.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    name: Deploy to server
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: cd /storage/www/storno && ./deploy/deploy.sh
