name: Agent Release

on:
  push:
    branches: [main]
    paths:
      - 'agent/package.json'

jobs:
  check-version:
    name: Check version change
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.current }}
      changed: ${{ steps.version.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect version change
        id: version
        run: |
          CURRENT=$(node -p "require('./agent/package.json').version")
          PREVIOUS=$(git show HEAD~1:agent/package.json 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version" 2>/dev/null || echo "")
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: macos-arm64
            os: macos-14
            pkg-target: node20-macos-arm64
          - target: macos-x64
            os: macos-14
            pkg-target: node20-macos-x64
          - target: win-x64
            os: ubuntu-latest
            pkg-target: node20-win-x64
          - target: linux-x64
            os: ubuntu-latest
            pkg-target: node20-linux-x64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: agent/package-lock.json

      - name: Install dependencies
        working-directory: agent
        run: npm ci

      - name: Bundle
        working-directory: agent
        run: npm run bundle

      - name: Build binary
        working-directory: agent
        run: npx pkg build/agent.cjs --targets ${{ matrix.pkg-target }} --output build/storno-agent-${{ matrix.target }}

      - name: Create macOS .app bundle
        if: startsWith(matrix.target, 'macos-')
        working-directory: agent
        run: |
          ARCH="${{ matrix.target == 'macos-arm64' && 'arm64' || 'x64' }}"
          ./scripts/create-macos-app.sh build/storno-agent-${{ matrix.target }} $ARCH

      - name: Embed Windows icon
        if: matrix.target == 'win-x64'
        working-directory: agent
        run: node scripts/set-windows-icon.mjs build/storno-agent-win-x64.exe

      - name: Upload artifact (macOS)
        if: startsWith(matrix.target, 'macos-')
        uses: actions/upload-artifact@v4
        with:
          name: storno-agent-${{ matrix.target }}
          path: |
            agent/build/storno-agent-${{ matrix.target }}
            agent/build/storno-agent-${{ matrix.target }}.zip

      - name: Upload artifact (Windows)
        if: matrix.target == 'win-x64'
        uses: actions/upload-artifact@v4
        with:
          name: storno-agent-${{ matrix.target }}
          path: agent/build/storno-agent-win-x64.exe

      - name: Upload artifact (Linux)
        if: matrix.target == 'linux-x64'
        uses: actions/upload-artifact@v4
        with:
          name: storno-agent-${{ matrix.target }}
          path: agent/build/storno-agent-linux-x64

  release:
    name: Create release
    needs: [check-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare binaries
        run: |
          mkdir -p release
          cp artifacts/storno-agent-macos-arm64/storno-agent-macos-arm64 release/
          cp artifacts/storno-agent-macos-arm64/storno-agent-macos-arm64.zip release/
          cp artifacts/storno-agent-macos-x64/storno-agent-macos-x64 release/
          cp artifacts/storno-agent-macos-x64/storno-agent-macos-x64.zip release/
          cp artifacts/storno-agent-win-x64/storno-agent-win-x64.exe release/
          cp artifacts/storno-agent-linux-x64/storno-agent-linux-x64 release/

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          gh release create "agent-v${VERSION}" \
            release/storno-agent-macos-arm64 \
            release/storno-agent-macos-arm64.zip \
            release/storno-agent-macos-x64 \
            release/storno-agent-macos-x64.zip \
            release/storno-agent-win-x64.exe \
            release/storno-agent-linux-x64 \
            --title "Storno ANAF Agent v${VERSION}" \
            --generate-notes \
            --notes-start-tag "$(gh release list --limit 1 --json tagName -q '.[0].tagName // empty' 2>/dev/null || echo '')"
