# In-app notification translations — English

notification:
  invoice_due_soon:
    title: '%company% — invoice due soon'
    message: 'Invoice %number% is due in 3 days (%date%)'
  invoice_due_today:
    title: '%company% — invoice due today'
    message: 'Invoice %number% is due today'
  invoice_overdue:
    title: '%company% — invoice overdue'
    message: 'Invoice %number% has been overdue since %date%'
  proforma_expiring_soon:
    title: '%company% — proforma expiring soon'
    message: 'Proforma %number% expires in 3 days (%date%)'
  proforma_expired:
    title: '%company% — proforma expired'
    message: 'Proforma %number% has expired on %date%'
  token_expiring:
    title: '%token% — ANAF token expiring'
    message: '{0} ANAF token (%token%) expires today|{1} ANAF token (%token%) expires in 1 day|]1,Inf[ ANAF token (%token%) expires in %count% days'
  token_expiring_no_refresh:
    title: '%token% — ANAF token expiring (manual)'
    message: '{0} ANAF token (%token%) expires today and cannot be renewed automatically. Please re-authorize manually.|{1} ANAF token (%token%) expires in 1 day and cannot be renewed automatically. Please re-authorize manually.|]1,Inf[ ANAF token (%token%) expires in %count% days and cannot be renewed automatically. Please re-authorize manually.'
  token_refresh_failed:
    title: '%token% — ANAF token renewal failed'
    message: 'The ANAF token (%token%) could not be renewed automatically. Please re-authorize manually.'
  anaf_deadline:
    title: '%company% — ANAF deadline expires tomorrow'
    message: 'Submit invoice %number% to ANAF by tomorrow. Issued on %date%.'
  anaf_missing_token:
    title: '%company% — connect SPV to submit to ANAF'
    message: 'Invoice %number% issued on %date% cannot be submitted to ANAF — no SPV token is configured. Connect SPV by %deadline% to avoid penalties.'
  export_ready:
    title: 'Export ready'
    message: 'Your export is ready for download.'
  backup_ready:
    title: 'Backup ready'
    message: 'Your backup is ready for download.'
  restore_completed:
    title: 'Restore completed'
    message: 'You successfully restored data for %name%.'
  payment_received:
    title: '%company% — payment received'
    message: 'You received %amount% %currency% for invoice %number%'
  invoice_validated:
    title: '%company% — invoice validated by ANAF'
    message: 'ANAF validated your invoice %number% · %amount%'
  invoice_rejected:
    title: '%company% — invoice rejected by ANAF'
    message: 'ANAF rejected your invoice %number% · %amount%: %error%'
  sync_error:
    title: '%company% — e-Factura sync error'
    single: '%company% — %error%'
    multiple: '%company% — %count% sync errors. First: %first_error%'
  efactura:
    new_documents:
      title: '%company%'
    new_incoming:
      message: 'You received an invoice from %counterparty% · %amount%'
    new_outgoing:
      message: 'You sent an invoice to %counterparty% · %amount%'
    new_documents_multi:
      message: 'You have %count% new documents (%incoming% incoming, %outgoing% outgoing)'
