# Email translations — English

confirmation:
  subject: 'Confirm your email — Storno.ro'
  body: "Hi%firstName%,\n\nThank you for signing up on Storno.ro!\n\nConfirm your email address by clicking the link below:\n%confirmUrl%\n\nThe link is valid for 24 hours.\n\nIf you did not create an account on Storno.ro, please ignore this email.\n\nThe Storno.ro Team"

welcome:
  subject: 'Welcome to Storno.ro!'
  body: "Hi%firstName%,\n\nWelcome to Storno.ro! Your account has been confirmed and you are ready to get started.\n\nHere is how to begin:\n\n1. Connect to ANAF for automatic e-Invoice synchronization:\n   %anafUrl%\n\n2. Create your first invoice:\n   %invoiceUrl%\n\nYour 14-day trial gives you access to all Starter plan features:\n- Automatic e-Invoice sync (every 12 hours)\n- PDF invoice generation\n- Send invoices by email\n- Reports and statistics\n- Mobile app\n- Up to 3 companies and 3 users\n\nIf you need help, reply to this email or write to us at contact@storno.ro.\n\nThe Storno.ro Team"

password_reset:
  subject: 'Reset your password — Storno.ro'
  body: "Hi,\n\nWe received a request to reset the password for your Storno.ro account.\n\nReset your password by clicking the link below:\n%resetUrl%\n\nThe link is valid for 2 hours.\n\nIf you did not request a password reset, please ignore this email.\n\nThe Storno.ro Team"

mfa_otp:
  subject: 'Verification code — Storno.ro'
  body: "Hi,\n\nYour verification code is: %code%\n\nThe code is valid for 5 minutes.\n\nIf you did not request this code, please ignore this email.\n\nThe Storno.ro Team"

invitation:
  subject: 'Storno.ro invitation — %orgName%'
  body: "Hi,\n\n%inviterName% has invited you to join the organization \"%orgName%\" on Storno.ro.\n\nYour role will be: %role%\n\nAccept the invitation here:\n%acceptUrl%\n\nThe invitation expires on %expiresAt%.\n\nIf you do not have an account, you can register using the link above.\n\nThe Storno.ro Team"

dunning:
  attempt1_subject: 'Payment failed — update your payment method'
  attempt1_body: "Hi%firstName%,\n\nThe subscription payment for your Storno.ro organization \"%orgName%\" has failed.\n\nPlease update your payment method to avoid service interruption:\n%billingUrl%\n\nIf you have questions, contact us at contact@storno.ro.\n\nThe Storno.ro Team"
  attempt2_subject: 'Your subscription is at risk — update your payment method'
  attempt2_body: "Hi%firstName%,\n\nWe still have not been able to process the subscription payment for your Storno.ro organization \"%orgName%\".\n\nPlease update your payment method as soon as possible to keep access to all features:\n%billingUrl%\n\nIf you do not update your payment method in the next few days, your account access will be suspended.\n\nThe Storno.ro Team"
  attempt3_subject: 'Last chance — your subscription will be cancelled'
  attempt3_body: "Hi%firstName%,\n\nThis is the final notice regarding the failed payment for the Storno.ro subscription of organization \"%orgName%\".\n\nIf you do not update your payment method today, your subscription will be cancelled and you will lose access to all premium features.\n\nUpdate now:\n%billingUrl%\n\nThe Storno.ro Team"

trial_expiration:
  subject: 'Your trial expires %urgency% — subscribe to keep access'
  body: "Hi%firstName%,\n\nYour Storno.ro trial for the organization \"%orgName%\" expires %urgency% (%trialEndsAt%).\n\nAfter expiration, you will lose access to:\n- Automatic e-Invoice sync\n- PDF invoice generation\n- Send invoices by email\n- Reports and statistics\n- Mobile app\n- And more Starter plan features\n\nSubscribe now to keep all these features:\n%billingUrl%\n\nThe Storno.ro Team"
  urgency_tomorrow: 'tomorrow'
  urgency_3days: 'in 3 days'
  urgency_7days: 'in 7 days'

subscription:
  subject: 'Your subscription is active — Storno.ro'
  heading: 'Your subscription is active!'
  greeting: 'Hi %firstName%,'
  intro: 'Thank you for your purchase! Your <strong>%planLabel%</strong> plan is now active.'
  label_plan: 'Plan'
  label_amount: 'Amount'
  label_interval: 'Billing'
  interval_month: 'Monthly'
  interval_year: 'Yearly'
  license_key_label: 'License key (self-hosting)'
  invoice_note: 'Your invoice has been generated automatically and is available in your account.'
  cta: 'View subscription'

renewal:
  subject: 'Your subscription has been renewed — Storno.ro'
  heading: 'Payment processed successfully'
  greeting: 'Hi %firstName%,'
  intro: 'Your <strong>%planLabel%</strong> subscription has been renewed successfully.'
  label_plan: 'Plan'
  label_amount: 'Amount'
  label_interval: 'Billing'
  interval_month: 'Monthly'
  interval_year: 'Yearly'
  invoice_note: 'Your invoice has been generated automatically and is available in your account.'
  cta: 'View invoice'

cancelled:
  subject: 'Your subscription has been cancelled — Storno.ro'
  heading: 'Subscription cancelled'
  greeting: 'Hi %firstName%,'
  intro: 'Your <strong>%previousPlan%</strong> subscription has been cancelled. Your account has been downgraded to the free plan.'
  lost_access_title: 'You no longer have access to:'
  feature_sync: 'Automatic e-Invoice sync'
  feature_pdf: 'PDF invoice generation'
  feature_email: 'Send invoices by email'
  feature_reports: 'Reports and statistics'
  feature_mobile: 'Mobile app'
  resubscribe_note: 'You can reactivate your subscription at any time to regain access to all features.'
  cta: 'Resubscribe'

plan_changed:
  subject_upgrade: 'Your plan has been upgraded to %newPlan% — Storno.ro'
  subject_downgrade: 'Your plan has been changed to %newPlan% — Storno.ro'
  heading_upgrade: 'Plan upgraded!'
  heading_downgrade: 'Plan changed'
  greeting: 'Hi %firstName%,'
  intro_upgrade: 'Congratulations! Your plan has been upgraded from <strong>%oldPlan%</strong> to <strong>%newPlan%</strong>.'
  intro_downgrade: 'Your plan has been changed from <strong>%oldPlan%</strong> to <strong>%newPlan%</strong>.'
  label_previous: 'Previous plan'
  label_current: 'Current plan'
  note: 'The new features are available immediately in your account.'
  cta: 'View plan'

re_engagement:
  subject: "We miss you — what's new on Storno.ro"
  body: "Hi%firstName%,\n\nWe have not seen you on Storno.ro for a while and wanted to let you know about what we have added recently:\n\n- Improved e-Invoice ANAF synchronization\n- Advanced CSV and PDF export\n- Detailed statistics and reports\n- Notifications for overdue invoices\n\nCome back and check out all the updates:\n%baseUrl%\n\nIf you have questions or suggestions, write to us at contact@storno.ro.\n\nThe Storno.ro Team"

lifecycle:
  re_engagement:
    subject: "How's it going? Come back to Storno"
    body: "Hi%firstName%,\n\nHaven't seen you in a while, so I figured I'd reach out directly.\n\nIn the meantime, we've shipped a few things I think you'll like:\n\n- e-Invoice sync every 30 minutes (down from 12 hours)\n- Fast company lookup by CIF, right inside the app\n- Improved CSV export for your accountant\n- Mobile push notifications for invoices coming due\n\nStorno is built by founders, for founders — every update comes from real feedback from users like you.\n\nCome take a look:\n%baseUrl%\n\nIf you have questions or want to tell me what's missing, just reply to this email.\n\n— Florin from Storno"

  account_without_login:
    subject: 'Your Storno account is waiting — got two minutes?'
    body: "Hi%firstName%,\n\nYou created your Storno account but haven't logged in yet. I get it — life is busy.\n\nHere's what's waiting for you the first time you log in:\n\n1. Connect your company to ANAF and e-Invoices sync automatically\n2. Issue your first invoice in under 2 minutes\n3. Give your accountant access with a single click\n\nYour 14-day trial is active and running — it'd be a shame to let it slip by unused.\n\nLog in now:\n%loginUrl%\n\nIf you need help or want someone to walk you through it, just reply to this email.\n\n— Florin from Storno"

  first_company_created:
    subject: "You added your first company — let's issue your first invoice"
    body: "Hi%firstName%,\n\nNice work — you've added \"%orgName%\" to Storno!\n\nThe natural next step is to issue your first invoice. It takes under 2 minutes:\n\n1. Click \"New invoice\"\n2. Add the client (or look them up by CIF)\n3. Add the product or service\n4. Send it or download the PDF\n\nIf you're billing with e-Invoice, connect your company to ANAF under Settings > ANAF and invoices will be sent automatically.\n\nYou've got 14 days of trial left — let's put them to good use:\n%baseUrl%\n\n— Florin from Storno"

  first_invoice_created:
    subject: 'First invoice issued — it gets easier from here'
    body: "Hi%firstName%,\n\nYou've issued your first invoice through Storno for \"%orgName%\". Seriously, well done.\n\nNow that you've got the hang of it, a few things that'll come in handy:\n\n- You can email the invoice straight to the client from inside the app\n- You can turn on automatic submission to ANAF for e-Invoice\n- You can add your accountant as a user so they pull invoices themselves\n- The mobile app works identically to the web version\n\nIf you have questions about any of these, just reply directly.\n\n%baseUrl%\n\n— Florin from Storno"

  trial_ended:
    1d:
      subject: 'Your trial just ended — what now?'
      body: "Hi%firstName%,\n\nYour trial for \"%orgName%\" ended yesterday.\n\nI know 14 days fly by. If you got to test things out and Storno is a fit, plans start at 19 RON/month on Starter — less than a Netflix subscription.\n\nIf not, tell me what was missing and I'll see what I can do.\n\nSubscribe and keep your access:\n%billingUrl%\n\n— Florin from Storno"
    7d:
      subject: "A week since your trial ended — still interested?"
      body: "Hi%firstName%,\n\nIt's been a week since the trial for \"%orgName%\" ended.\n\nIf you haven't found time to subscribe, I totally get it. But if you're using Storno and want to keep going, plans start at 19 RON/month — pay by card, cancel anytime.\n\nIf you've moved to another solution, no hard feelings — but I'd love to hear why, so I can make things better.\n\nReply to this email or subscribe directly:\n%billingUrl%\n\n— Florin from Storno"
    30d:
      subject: 'A month since your trial ended — last time I write'
      body: "Hi%firstName%,\n\nIt's been a month since the trial for \"%orgName%\" ended and I don't want to clog up your inbox for no reason.\n\nIf you want to come back to Storno, you're welcome anytime. Plans start at 19 RON/month and activation is instant:\n%billingUrl%\n\nIf not, I won't write about this again. All the best with the business!\n\n— Florin from Storno"

  feature_drip:
    efactura:
      subject: 'e-Invoice is mandatory — how Storno handles it automatically'
      body: "Hi%firstName%,\n\nIf you bill other businesses, e-Invoice is mandatory — and submitting manually on SPV takes time and invites mistakes.\n\nIn Storno, you connect your company to ANAF once and from then on invoices go to SPV automatically. No more refreshing, no more checking if it went through.\n\nHow to turn it on:\n1. Open Companies and pick the company\n2. Click the ANAF tab and connect your token\n3. Enable automatic submission\n\nDone. Storno takes care of the rest.\n\n%baseUrl%/companies\n\n— Florin from Storno"
    anaf_lookup:
      subject: 'Looking up companies by CIF? Storno does it for you'
      body: "Hi%firstName%,\n\nWhen you add a new client in Storno, you don't have to type in company details by hand.\n\nYou enter the CIF and Storno pulls it automatically from the ANAF database: company name, address, VAT status.\n\nIt saves you time and eliminates transcription errors — especially when you're billing new companies.\n\nTry it from here:\n%baseUrl%/clients\n\n— Florin from Storno"
    contabil_user:
      subject: 'Your accountant can pull invoices straight from Storno'
      body: "Hi%firstName%,\n\nIf you're still sending your accountant invoices over email or WhatsApp, there's a better way.\n\nYou can add your accountant as a user in Storno with view-only access. They log in directly, download what they need, and you stop being interrupted.\n\nReal benefits:\n- No more sending invoices manually\n- Your accountant sees the full ledger\n- Fewer transcription errors in their accounting software\n\nAdd a user now:\n%baseUrl%/settings/team\n\n— Florin from Storno"
    mobile_app:
      subject: 'The Storno mobile app — issue invoices from your phone'
      body: "Hi%firstName%,\n\nIf you haven't tried the Storno mobile app yet, it's worth two minutes.\n\nIt does exactly what the web version does: invoices, e-Invoice, clients, reports. Works on iOS and Android.\n\nEspecially handy when you're at the client's and want to send the invoice on the spot, or when you want to check a payment quickly.\n\nDownload from the App Store or Google Play:\nhttps://storno.ro/mobile-app\n\n— Florin from Storno"

