    message: 'Factura %number% emisa pe %date% nu poate fi trimisa la ANAF — niciun token SPV nu este configurat. Conecteaza SPV pana pe %deadline% pentru a evita amenzile.'
  export_ready:
    title: 'Export finalizat'
    message: 'Exportul tau este gata pentru descarcare.'
  backup_ready:
    title: 'Backup finalizat'
    message: 'Backupul tau este gata pentru descarcare.'
  restore_completed:
    title: 'Restaurare finalizata'
    message: 'Backupul a fost restaurat cu succes.'
  payment_received:
    title: 'Plata inregistrata'
    message: 'Plata de %amount% %currency% inregistrata pentru factura %number%'
