# In-app notification translations — Romanian

notification:
  invoice_due_soon:
    title: '%company% — factura scadenta in curand'
    message: 'Factura %number% este scadenta in 3 zile (%date%)'
  invoice_due_today:
    title: '%company% — factura scadenta astazi'
    message: 'Factura %number% este scadenta astazi'
  invoice_overdue:
    title: '%company% — factura restanta'
    message: 'Factura %number% este scadenta din %date%'
  proforma_expiring_soon:
    title: '%company% — proforma expira in curand'
    message: 'Proforma %number% expira in 3 zile (%date%)'
  proforma_expired:
    title: '%company% — proforma expirata'
    message: 'Proforma %number% a expirat pe %date%'
  token_expiring:
    title: '%token% — token ANAF expira'
    message: '{0} Tokenul ANAF (%token%) expira astazi|{1} Tokenul ANAF (%token%) expira intr-o zi|]1,19] Tokenul ANAF (%token%) expira in %count% zile|]19,Inf[ Tokenul ANAF (%token%) expira in %count% de zile'
  token_expiring_no_refresh:
    title: '%token% — token ANAF expira (manual)'
    message: '{0} Tokenul ANAF (%token%) expira astazi si nu poate fi reinnoit automat. Re-autorizeaza manual.|{1} Tokenul ANAF (%token%) expira intr-o zi si nu poate fi reinnoit automat. Re-autorizeaza manual.|]1,19] Tokenul ANAF (%token%) expira in %count% zile si nu poate fi reinnoit automat. Re-autorizeaza manual.|]19,Inf[ Tokenul ANAF (%token%) expira in %count% de zile si nu poate fi reinnoit automat. Re-autorizeaza manual.'
  token_refresh_failed:
    title: '%token% — eroare reinnoire token ANAF'
    message: 'Tokenul ANAF (%token%) nu a putut fi reinnoit automat. Re-autorizeaza manual.'
  anaf_deadline:
    title: '%company% — termen ANAF expira maine'
    message: 'Trimite factura %number% la ANAF pana maine. Emisa pe %date%.'
  anaf_missing_token:
    title: '%company% — conecteaza-te la SPV pentru ANAF'
    message: 'Factura %number% emisa pe %date% nu poate fi trimisa la ANAF — niciun token SPV nu este configurat. Conecteaza-te la SPV pana pe %deadline% pentru a evita amenzile.'
  export_ready:
    title: 'Export finalizat'
    message: 'Exportul tau este gata pentru descarcare.'
  backup_ready:
    title: 'Backup finalizat'
    message: 'Backupul tau este gata pentru descarcare.'
  restore_completed:
    title: 'Restaurare finalizata'
    message: 'Ai restaurat cu succes datele companiei %name%.'
  payment_received:
    title: '%company% — plata inregistrata'
    message: 'Ai primit %amount% %currency% pentru factura %number%'
  invoice_validated:
    title: '%company% — factura validata ANAF'
    message: 'ANAF ti-a validat factura %number% · %amount%'
  invoice_rejected:
    title: '%company% — factura respinsa ANAF'
    message: 'ANAF ti-a respins factura %number% · %amount%: %error%'
  sync_error:
    title: '%company% — eroare sincronizare e-Factura'
    single: '%company% — %error%'
    multiple: '%company% — %count% erori de sincronizare. Prima: %first_error%'
  efactura:
    new_documents:
      title: '%company%'
    new_incoming:
      message: 'Ai primit o factura de la %counterparty% · %amount%'
    new_outgoing:
      message: 'Ai emis o factura catre %counterparty% · %amount%'
    new_documents_multi:
      message: 'Ai %count% documente noi (%incoming% primite, %outgoing% emise)'
