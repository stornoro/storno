# Single source of truth for client-update version metadata.
# Bump these whenever a new web build or mobile binary is released so the
# /api/v1/version endpoint can drive in-app upgrade prompts.
parameters:
    app.version_metadata:
        web:
            # latest is read from VERSION.txt; only `min` is configured here.
            min: '2.6.0'
            releaseNotes: 'https://github.com/stornoro/storno/releases'
        # Per-platform mobile gate. The endpoint computes a `tier` per request:
        #   - blocking      : client < min     → must update
        #   - recommended   : min ≤ client < latest → skippable prompt
        #   - ok            : client ≥ latest  → no prompt
        # Bump `min` only on a breaking server change or a security incident.
        # Optional `message` is shown to the user under the prompt; key per
        # locale (ro/en/de/fr). Optional `releaseNotesUrl` shows a "what's new"
        # link. `storeUrl` is the deep link the Update button opens.
        mobile:
            ios:
                latest: '1.1.2'
                min: '1.0.0'
                storeUrl: 'https://apps.apple.com/app/storno-ro/id6761785908'
                releaseNotesUrl: null
                message: {}
            android:
                latest: '1.1.2'
                min: '1.0.0'
                storeUrl: 'https://play.google.com/store/apps/details?id=com.storno.app'
                releaseNotesUrl: null
                message: {}
            huawei:
                latest: '1.1.2'
                min: '1.0.0'
                # TODO: replace with the real AppGallery app ID (C-prefixed)
                # once the build is published. The placeholder is harmless
                # — the upgrade prompt only opens this URL on Huawei devices.
                storeUrl: 'https://appgallery.huawei.com/app/C0000000000'
                releaseNotesUrl: null
                message: {}
