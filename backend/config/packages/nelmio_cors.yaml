nelmio_cors:
    defaults:
        origin_regex: true
        allow_origin: ['%env(CORS_ALLOW_ORIGIN)%']
        allow_credentials: true
        allow_methods: ['GET', 'OPTIONS', 'POST', 'PUT', 'PATCH', 'DELETE']
        allow_headers: ['Content-Type', 'Authorization', 'X-Stripe-App-Token', 'X-Company', 'X-Organization']
        expose_headers: ['Link']
        max_age: 3600
    paths:
        # Paths the Stripe extension iframe (Origin: null, X-Stripe-App-Token)
        # reaches into. /stripe-app/* is OAuth + extension-only; /invoices and
        # /clients are shared with the Storno frontend (Origin: app.storno.ro,
        # JWT Bearer) — both must work, so allow null + the configured frontend
        # origin and a header set covering both auth schemes.
        '^/api/v1/(stripe-app/|invoices(/|$)|clients(/|$))':
            origin_regex: true
            allow_origin:
                - '^null$'
                - '%env(CORS_ALLOW_ORIGIN)%'
            allow_credentials: true
            allow_methods: ['GET', 'OPTIONS', 'POST', 'PUT', 'PATCH', 'DELETE']
            allow_headers: ['Accept', 'Content-Type', 'Authorization', 'X-Stripe-App-Token', 'X-Company', 'X-Organization']
            max_age: 3600
        '^/': null
